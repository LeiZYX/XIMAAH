# Nginx site config for XIMA Assessment Hub
# Install on Ubuntu host (not inside Docker):
#   sudo cp deploy/nginx/exam.shssip-iedu.cn.conf /etc/nginx/sites-available/exam.shssip-iedu.cn.conf
#   sudo ln -sf /etc/nginx/sites-available/exam.shssip-iedu.cn.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS certificates (Certbot example):
#   sudo certbot --nginx -d exam.shssip-iedu.cn

upstream xima_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name exam.shssip-iedu.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name exam.shssip-iedu.cn;

    # Update paths after running certbot, or use certbot-managed includes.
    ssl_certificate     /etc/letsencrypt/live/exam.shssip-iedu.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/exam.shssip-iedu.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://xima_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
