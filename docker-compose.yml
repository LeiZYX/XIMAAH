services:
  postgres:
    image: postgres:16-alpine
    container_name: xima-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: xima_assessment_hub
    volumes:
      - xima_pg_data:/var/lib/postgresql/data

  data-processor:
    build: ./services/data-processor
    container_name: xima-data-processor
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATA_PROCESSOR_CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"

volumes:
  xima_pg_data:
